<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 270px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e0d0e8;
    user-select: none;
    /* Layered background: deep gradient + subtle noise texture via radial overlay */
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(180,100,150,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, #0a0818 0%, #110e22 50%, #0f0c20 100%);
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* ================================================================
     HEADER
     ================================================================ */

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 10px;
    position: relative;
  }

  .heart-stage {
    position: relative;
    width: 80px; height: 80px;
    margin-bottom: 12px;
  }

  /* --- Main heart --- */
  .heart-main {
    position: absolute;
    inset: 0;
  }

  .heart-main svg { width: 100%; height: 100%; }

  /* CSS drop-shadow follows the heart's alpha channel — no square boundary */
  .heart-stage.active .heart-main svg {
    filter:
      drop-shadow(0 0 8px rgba(255, 100, 130, 0.55))
      drop-shadow(0 0 22px rgba(255, 80, 110, 0.30));
  }

  .heart-fill {
    fill: url(#heart-grad-active);
  }

  .heart-stage.paused .heart-fill {
    fill: url(#heart-grad-paused);
  }

  .heart-outline {
    fill: none;
    stroke-width: 1.2;
  }

  .heart-stage.active .heart-outline {
    stroke: rgba(255, 160, 180, 0.35);
  }

  .heart-stage.paused .heart-outline {
    stroke: rgba(150, 140, 165, 0.2);
  }

  /* Heartbeat */
  @keyframes heartbeat {
    0%   { transform: scale(1); }
    12%  { transform: scale(1.1); }
    24%  { transform: scale(1); }
    36%  { transform: scale(1.06); }
    48%  { transform: scale(1); }
    100% { transform: scale(1); }
  }

  .heart-stage.active .heart-main {
    animation: heartbeat 1.6s ease-in-out infinite;
  }

  /* --- Sparkles --- */
  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
  }

  .sparkle::before {
    content: '';
    display: block;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #ffb8c8;
    box-shadow: 0 0 6px 1.5px rgba(255, 140, 170, 0.8);
  }

  .sparkle.s1 { top: -6px;  left: 50%; margin-left: -3px; }
  .sparkle.s2 { top: 50%;  right: -6px; margin-top: -3px; }
  .sparkle.s3 { bottom: -6px; left: 50%; margin-left: -3px; }
  .sparkle.s4 { top: 50%;  left: -6px; margin-top: -3px; }
  .sparkle.s5 { top: 8%;   right: 6%; }
  .sparkle.s6 { bottom: 10%; left: 10%; }

  .heart-stage.active .sparkle::before {
    animation: sparkle-flicker 2s ease-in-out infinite;
  }

  .heart-stage.active .sparkle.s1::before { animation-delay: 0s; }
  .heart-stage.active .sparkle.s2::before { animation-delay: 0.4s; }
  .heart-stage.active .sparkle.s3::before { animation-delay: 0.8s; }
  .heart-stage.active .sparkle.s4::before { animation-delay: 1.2s; }
  .heart-stage.active .sparkle.s5::before { animation-delay: 0.2s; }
  .heart-stage.active .sparkle.s6::before { animation-delay: 0.6s; }

  @keyframes sparkle-flicker {
    0%, 100% { opacity: 0; transform: scale(0.4); }
    50%      { opacity: 1; transform: scale(1.3); }
  }

  /* --- Title --- */
  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #d4bce4;
  }

  /* ================================================================
     DIVIDER
     ================================================================ */

  .divider {
    height: 1px; margin: 0 24px;
    background: linear-gradient(90deg, transparent, rgba(180, 130, 200, 0.16), transparent);
  }

  /* ================================================================
     TOGGLE
     ================================================================ */

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px 8px;
  }

  .toggle-label {
    font-size: 13px; font-weight: 500;
    color: #b8a0cc;
    transition: color 0.3s;
  }

  .toggle-label.active { color: #ff90a4; }

  .toggle-wrap {
    position: relative;
    width: 50px; height: 28px;
    flex-shrink: 0; margin: 0 12px;
  }

  .toggle-wrap input {
    opacity: 0; width: 0; height: 0; position: absolute;
  }

  .toggle-slider {
    position: absolute; inset: 0;
    background: #352a44;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.35s, box-shadow 0.35s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: #ece0f2;
    border-radius: 50%;
    transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }

  input:checked + .toggle-slider {
    background: linear-gradient(135deg, #ff4d6a, #ff6b81);
    box-shadow: 0 0 16px rgba(255,77,106,0.4), inset 0 1px 2px rgba(255,255,255,0.12);
  }

  input:checked + .toggle-slider::before {
    transform: translateX(22px);
    background: #fff;
  }

  /* ================================================================
     SLIDERS
     ================================================================ */

  .sliders {
    padding: 10px 24px 12px;
  }

  .slider-group {
    margin-bottom: 10px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .slider-label span:first-child {
    font-size: 12px;
    color: #a088c0;
    font-weight: 500;
  }

  .slider-label span:last-child {
    font-size: 10.5px; min-width: 34px; text-align: center;
    padding: 2px 7px;
    border-radius: 7px;
    background: rgba(255,255,255,0.03);
    color: #b898d0;
    font-weight: 500;
    transition: color 0.3s, background 0.3s;
  }

  .slider-label span.hot {
    color: #ff8aa0;
    background: rgba(255,77,106,0.15);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
  }

  /* Track fill effect handled by JS inline style */

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c0a0d0;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(180,140,200,0.35);
    margin-top: -6px;
    transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.15);
  }

  input[type="range"]:disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  .enabled-range::-webkit-slider-thumb {
    background: #ff6b81;
    box-shadow: 0 0 12px rgba(255,107,129,0.55);
  }

  /* ================================================================
     STATUS
     ================================================================ */

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 0 4px;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #352a44;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.lit {
    background: #ff6b81;
    box-shadow: 0 0 6px rgba(255,107,129,0.6);
    animation: dot-pulse 1.4s ease-in-out infinite;
  }

  .status-dot.lit:nth-child(2) { animation-delay: 0.15s; }
  .status-dot.lit:nth-child(3) { animation-delay: 0.30s; }
  .status-dot.lit:nth-child(4) { animation-delay: 0.45s; }
  .status-dot.lit:nth-child(5) { animation-delay: 0.60s; }
  .status-dot.lit:nth-child(6) { animation-delay: 0.75s; }
  .status-dot.lit:nth-child(7) { animation-delay: 0.90s; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.75); }
    50%      { opacity: 1;   transform: scale(1.25); }
  }

  .status-text {
    font-size: 11px; color: #685878;
    text-align: center;
    padding: 0 0 18px;
    letter-spacing: 0.6px;
    transition: color 0.3s;
    font-weight: 500;
  }

  .status-text.active { color: #b890c0; }
</style>
</head>
<body>

<!-- SVG defs -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="heart-grad-active" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#ff5e78"/>
      <stop offset="40%"  stop-color="#e64568"/>
      <stop offset="100%" stop-color="#c42e54"/>
    </linearGradient>

    <linearGradient id="heart-grad-paused" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#595068"/>
      <stop offset="50%"  stop-color="#4a405a"/>
      <stop offset="100%" stop-color="#3a3048"/>
    </linearGradient>

    <path id="heart-path"
      d="M16 27 C8 19.5, 2.5 14, 2.5 9 C2.5 5.2, 5.5 2.5, 9 2.5
         C11.5 2.5, 13.8 4, 16 7 C18.2 4, 20.5 2.5, 23 2.5
         C26.5 2.5, 29.5 5.2, 29.5 9 C29.5 14, 24 19.5, 16 27Z" />
  </defs>
</svg>

<!-- Background particles -->
<div class="particles" id="particles">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
</div>

<!-- Header -->
<div class="header">
  <div class="heart-stage active" id="heartStage">

    <!-- Main heart -->
    <div class="heart-main">
      <svg viewBox="0 0 32 32">
        <use href="#heart-path" class="heart-outline"/>
        <use href="#heart-path" class="heart-fill"/>
      </svg>
    </div>

    <!-- Sparkles -->
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
    <div class="sparkle s5"></div>
    <div class="sparkle s6"></div>
  </div>

  <div class="title">爱心满满</div>
</div>

<div class="divider"></div>

<!-- Toggle -->
<div class="toggle-row">
  <span class="toggle-label" id="labelOff">暂停</span>
  <label class="toggle-wrap" for="toggle">
    <input type="checkbox" id="toggle" checked>
    <span class="toggle-slider"></span>
  </label>
  <span class="toggle-label active" id="labelOn">扩散</span>
</div>

<div class="divider"></div>

<!-- Sliders -->
<div class="sliders">
  <div class="slider-group">
    <div class="slider-label">
      <span>频率</span>
      <span id="freqVal">中</span>
    </div>
    <input type="range" id="freqSlider" min="1" max="10" value="5" step="1">
  </div>
  <div class="slider-group">
    <div class="slider-label">
      <span>密度</span>
      <span id="densVal">1x</span>
    </div>
    <input type="range" id="densSlider" min="1" max="6" value="1" step="1">
  </div>
</div>

<!-- Status -->
<div class="status-bar" id="statusDots">
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
</div>

<div class="status-text active" id="statusText">爱心正在扩散中...</div>

<script src="popup.js"></script>
</body>
</html>
