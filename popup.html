<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 270px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(ellipse at 50% 20%, #1e1335 0%, #0f0c22 70%);
    color: #e0d0e8;
    overflow: hidden;
    user-select: none;
  }

  /* ========================================
     HEADER — Beautiful layered heart
     ======================================== */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 20px 8px;
    position: relative;
  }

  .heart-stage {
    position: relative;
    width: 72px; height: 72px;
    margin-bottom: 10px;
  }

  /* --- Glow ring behind heart --- */
  .heart-glow {
    position: absolute;
    inset: -12px;
  }

  .heart-glow svg {
    width: 100%; height: 100%;
  }

  .glow-path {
    fill: none;
    stroke: rgba(255, 90, 120, 0.18);
    stroke-width: 3;
    filter: blur(6px);
  }

  .heart-stage.active .glow-path {
    stroke: rgba(255, 80, 110, 0.35);
    animation: glow-pulse 1.5s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { stroke: rgba(255, 80, 110, 0.25); stroke-width: 3; }
    50%      { stroke: rgba(255, 80, 110, 0.60); stroke-width: 5; }
  }

  /* --- Main heart --- */
  .heart-main {
    position: absolute;
    inset: 0;
  }

  .heart-main svg {
    width: 100%; height: 100%;
  }

  .heart-fill {
    fill: url(#heart-grad);
  }

  .heart-stage.active .heart-fill {
    fill: url(#heart-grad-active);
  }

  .heart-stage.paused .heart-fill {
    fill: url(#heart-grad-paused);
  }

  /* Heart outline */
  .heart-outline {
    fill: none;
    stroke-width: 1.5;
  }

  .heart-stage.active .heart-outline {
    stroke: rgba(255, 140, 160, 0.3);
  }

  .heart-stage.paused .heart-outline {
    stroke: rgba(140, 130, 155, 0.2);
  }

  /* ====== Heartbeat animation ====== */
  @keyframes heartbeat {
    0%   { transform: scale(1); }
    12%  { transform: scale(1.12); }
    24%  { transform: scale(1); }
    36%  { transform: scale(1.07); }
    48%  { transform: scale(1); }
    100% { transform: scale(1); }
  }

  .heart-stage.active .heart-main {
    animation: heartbeat 1.5s ease-in-out infinite;
  }

  /* ====== Orbiting sparkles ====== */
  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
  }

  .sparkle::before {
    content: '';
    display: block;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #ffb0c0;
    box-shadow: 0 0 5px 1px rgba(255, 150, 180, 0.7);
  }

  .sparkle.s1 { top: -4px;  left: 50%; margin-left: -2.5px; }
  .sparkle.s2 { top: 50%;  right: -4px; margin-top: -2.5px; }
  .sparkle.s3 { bottom: -4px; left: 50%; margin-left: -2.5px; }
  .sparkle.s4 { top: 50%;  left: -4px; margin-top: -2.5px; }
  .sparkle.s5 { top: 10%;  right: 5%; }
  .sparkle.s6 { bottom: 8%; left: 8%; }

  .heart-stage.active .sparkle::before {
    animation: sparkle-flicker 2s ease-in-out infinite;
  }

  .heart-stage.active .sparkle.s1::before { animation-delay: 0s; }
  .heart-stage.active .sparkle.s2::before { animation-delay: 0.4s; }
  .heart-stage.active .sparkle.s3::before { animation-delay: 0.8s; }
  .heart-stage.active .sparkle.s4::before { animation-delay: 1.2s; }
  .heart-stage.active .sparkle.s5::before { animation-delay: 0.2s; }
  .heart-stage.active .sparkle.s6::before { animation-delay: 0.6s; }

  @keyframes sparkle-flicker {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: 1; transform: scale(1.3); }
  }

  /* ====== Title ====== */
  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: #d4b8e8;
  }

  /* ========================================
     BACKGROUND PARTICLES
     ======================================== */
  .particles {
    position: absolute; inset: 0;
    pointer-events: none; overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255, 150, 180, 0.45);
    animation: float-up 3.2s ease-in infinite;
    opacity: 0;
  }

  .particle:nth-child(1) { left: 15%; animation-delay: 0s; }
  .particle:nth-child(2) { left: 35%; animation-delay: 0.6s; }
  .particle:nth-child(3) { left: 55%; animation-delay: 1.2s; }
  .particle:nth-child(4) { left: 72%; animation-delay: 0.3s; }
  .particle:nth-child(5) { left: 85%; animation-delay: 0.9s; }
  .particle:nth-child(6) { left: 45%; animation-delay: 1.6s; }
  .particle:nth-child(7) { left: 25%; animation-delay: 1.9s; }
  .particle:nth-child(8) { left: 62%; animation-delay: 0.15s; }

  @keyframes float-up {
    0%   { transform: translateY(70px) scale(0); opacity: 0; }
    25%  { opacity: 0.5; }
    55%  { opacity: 0.25; }
    100% { transform: translateY(-15px) scale(1.3); opacity: 0; }
  }

  /* ========================================
     DIVIDER
     ======================================== */
  .divider {
    height: 1px; margin: 0 22px;
    background: linear-gradient(90deg, transparent, rgba(180, 130, 200, 0.18), transparent);
  }

  /* ========================================
     TOGGLE ROW
     ======================================== */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px 6px;
  }

  .toggle-label {
    font-size: 13px; font-weight: 500;
    color: #c0a8d4;
    transition: color 0.3s;
  }

  .toggle-label.active { color: #ff8aa0; }

  .toggle-wrap {
    position: relative;
    width: 48px; height: 26px;
    flex-shrink: 0; margin: 0 10px;
  }

  .toggle-wrap input {
    opacity: 0; width: 0; height: 0; position: absolute;
  }

  .toggle-slider {
    position: absolute; inset: 0;
    background: #3a2e48; border-radius: 13px;
    cursor: pointer;
    transition: background 0.35s, box-shadow 0.35s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: #f0e0f4; border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  input:checked + .toggle-slider {
    background: linear-gradient(135deg, #ff4d6a, #ff6b81);
    box-shadow: 0 0 14px rgba(255,77,106,0.35), inset 0 1px 2px rgba(255,255,255,0.15);
  }

  input:checked + .toggle-slider::before {
    transform: translateX(22px);
    background: #fff;
  }

  /* ========================================
     SLIDERS
     ======================================== */
  .sliders {
    padding: 6px 22px 10px;
  }

  .slider-group {
    margin-bottom: 8px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }

  .slider-label span:first-child {
    font-size: 12px; color: #a890c0;
  }

  .slider-label span:last-child {
    font-size: 11px; min-width: 32px; text-align: right;
    padding: 1px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: #c0a0d4;
    transition: color 0.3s, background 0.3s;
  }

  .slider-label span.hot {
    color: #ff8aa0;
    background: rgba(255,77,106,0.12);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #2a2040;
    outline: none;
    transition: background 0.3s;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #c0a0d0;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(180,140,200,0.3);
    transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.2);
  }

  input[type="range"]:disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .enabled-range::-webkit-slider-thumb {
    background: #ff6b81;
    box-shadow: 0 0 10px rgba(255,107,129,0.5);
  }

  /* ========================================
     STATUS
     ======================================== */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 5px 0 3px;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #3a2e48;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.lit {
    background: #ff6b81;
    box-shadow: 0 0 5px rgba(255,107,129,0.6);
    animation: dot-pulse 1.4s ease-in-out infinite;
  }

  .status-dot.lit:nth-child(2) { animation-delay: 0.15s; }
  .status-dot.lit:nth-child(3) { animation-delay: 0.3s; }
  .status-dot.lit:nth-child(4) { animation-delay: 0.45s; }
  .status-dot.lit:nth-child(5) { animation-delay: 0.6s; }
  .status-dot.lit:nth-child(6) { animation-delay: 0.75s; }
  .status-dot.lit:nth-child(7) { animation-delay: 0.9s; }

  @keyframes dot-pulse {
    0%,100% { opacity: 0.3; transform: scale(0.8); }
    50%     { opacity: 1;   transform: scale(1.2); }
  }

  .status-text {
    font-size: 11px; color: #706080;
    text-align: center;
    padding: 0 0 16px;
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }

  .status-text.active { color: #c090b0; }
</style>
</head>
<body>

<!-- ====== SVG Definitions ====== -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Active gradient: rich pink to coral -->
    <linearGradient id="heart-grad-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff5e78"/>
      <stop offset="45%"  stop-color="#e8456a"/>
      <stop offset="100%" stop-color="#c73058"/>
    </linearGradient>
    <!-- Paused gradient: desaturated -->
    <linearGradient id="heart-grad-paused" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5a4e68"/>
      <stop offset="50%"  stop-color="#4a4058"/>
      <stop offset="100%" stop-color="#3a3048"/>
    </linearGradient>
    <!-- Blur filter for glow -->
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Heart path (32x32 viewBox) -->
    <path id="heart-path"
      d="M16 27 C8 19.5, 2.5 14, 2.5 9 C2.5 5.2, 5.5 2.5, 9 2.5
         C11.5 2.5, 13.8 4, 16 7 C18.2 4, 20.5 2.5, 23 2.5
         C26.5 2.5, 29.5 5.2, 29.5 9 C29.5 14, 24 19.5, 16 27Z" />

  </defs>
</svg>

<!-- ====== Background Particles ====== -->
<div class="particles" id="particles">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
</div>

<!-- ====== Header ====== -->
<div class="header">
  <div class="heart-stage active" id="heartStage">

    <!-- Glow ring -->
    <div class="heart-glow">
      <svg viewBox="0 0 32 32">
        <use href="#heart-path" class="glow-path" filter="url(#blur-glow)" />
      </svg>
    </div>

    <!-- Main heart -->
    <div class="heart-main">
      <svg viewBox="0 0 32 32">
        <use href="#heart-path" class="heart-outline" />
        <use href="#heart-path" class="heart-fill" />
      </svg>
    </div>

    <!-- Sparkles -->
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
    <div class="sparkle s5"></div>
    <div class="sparkle s6"></div>
  </div>

  <div class="title">爱心满满</div>
</div>

<div class="divider"></div>

<!-- ====== Toggle ====== -->
<div class="toggle-row">
  <span class="toggle-label" id="labelOff">暂停</span>
  <label class="toggle-wrap" for="toggle">
    <input type="checkbox" id="toggle" checked>
    <span class="toggle-slider"></span>
  </label>
  <span class="toggle-label active" id="labelOn">扩散</span>
</div>

<div class="divider"></div>

<!-- ====== Sliders ====== -->
<div class="sliders">
  <div class="slider-group">
    <div class="slider-label">
      <span>频率</span>
      <span id="freqVal">中</span>
    </div>
    <input type="range" id="freqSlider" min="1" max="10" value="5" step="1">
  </div>
  <div class="slider-group">
    <div class="slider-label">
      <span>密度</span>
      <span id="densVal">1x</span>
    </div>
    <input type="range" id="densSlider" min="1" max="6" value="1" step="1">
  </div>
</div>

<!-- ====== Status ====== -->
<div class="status-bar" id="statusDots">
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
  <div class="status-dot lit"></div>
</div>

<div class="status-text active" id="statusText">爱心正在扩散中...</div>

<script src="popup.js"></script>
</body>
</html>
