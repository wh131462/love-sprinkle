name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release trigger
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif echo "${{ github.event.head_commit.message }}" | grep -q '^feat: v'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipped: commit message does not match 'feat: v*'"
          fi

      - name: Package ZIP
        if: steps.check.outputs.should_run == 'true'
        run: |
          zip -r love-sprinkle.zip . \
            -x ".git/*" ".github/*" "scripts/gen_icons.py"
          ls -lh love-sprinkle.zip

      - name: Set version
        if: steps.check.outputs.should_run == 'true'
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'feat:\s*\Kv[\d.]+')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version $VERSION"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag "$VERSION"
            git push origin "$VERSION"
          else
            echo "Tag $VERSION already exists, skipping"
          fi

      - name: Release
        if: steps.check.outputs.should_run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          files: love-sprinkle.zip
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
