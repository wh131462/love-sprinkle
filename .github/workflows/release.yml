name: Release

on:
  push:
    branches: [main, master]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'feat: v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate extension key
        run: |
          openssl genrsa -out key.pem 2048

      - name: Package ZIP
        run: |
          zip -r love-sprinkle.zip . \
            -x ".git/*" ".github/*" "scripts/gen_icons.py" "key.pem"

      - name: Package CRX
        run: |
          google-chrome --pack-extension="${PWD}" \
            --pack-extension-key="${PWD}/key.pem" \
            --no-message-box 2>/dev/null || true
          if [ -f ../love-sprinkle.crx ]; then
            mv ../love-sprinkle.crx ./love-sprinkle.crx
          fi
          ls -lh love-sprinkle.crx love-sprinkle.zip

      - name: Create tag
        id: tag
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'feat:\s*\Kv[\d.]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tagging $VERSION"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          files: |
            love-sprinkle.zip
            love-sprinkle.crx
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
