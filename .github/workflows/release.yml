name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate extension key
        run: |
          openssl genrsa -out key.pem 2048

      - name: Package ZIP
        run: |
          zip -r love-sprinkle.zip . \
            -x ".git/*" ".github/*" "scripts/gen_icons.py" "key.pem"

      - name: Package CRX
        run: |
          google-chrome --pack-extension="${PWD}" \
            --pack-extension-key="${PWD}/key.pem" \
            --no-message-box 2>/dev/null || true
          # Chrome outputs the .crx one level up from the extension dir
          if [ -f ../love-sprinkle.crx ]; then
            mv ../love-sprinkle.crx ./love-sprinkle.crx
          fi
          ls -lh love-sprinkle.crx love-sprinkle.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            love-sprinkle.zip
            love-sprinkle.crx
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
